name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O gradle.zip
          unzip -q gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Generate Gradle Wrapper
        run: |
          cd VoiceFloatBall
          gradle wrapper --gradle-version 8.4

      - name: Build Debug APK
        run: |
          cd VoiceFloatBall
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VoiceFloatBall-debug
          path: VoiceFloatBall/app/build/outputs/apk/debug/*.apk
          retention-days: 30

